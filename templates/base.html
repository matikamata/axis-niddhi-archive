<!-- pipeline/13-ssg/templates/base.html -->
<!-- 💎 BRASILEIRINHO ENGINE — AXIS-NIDDHI v3.0 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Brasileirinho{% endblock %}</title>
    <link rel="stylesheet" href="{{ relative_root }}css/style.css">
</head>
<body>

    <main>
        <!-- Busca offline (Sprint 9) -->
        <form id="search-form" role="search" aria-label="Busca">
            <input
                type="search"
                id="search-input"
                placeholder="Search teachings..."
                aria-label="Search"
                autocomplete="off"
            />
        </form>
        <div id="search-results" hidden></div>

        {% block content %}{% endblock %}

        <footer>
            <p>Dhamma Preservation Project · 2500 Years of Teaching.</p>
            <p><small>Static Archive · IPFS Compatible · file:// Offline Ready</small></p>
        </footer>
    </main>

    <!-- Progressive Enhancement JS -->
    <script src="{{ relative_root }}js/main.js"></script>
    <script src="{{ relative_root }}js/reading-flow.js"></script>
    <script src="{{ relative_root }}js/pali-audio.js"></script>

    <!--
        Service Worker: DESATIVADO por padrão para compatibilidade com
        distribuição via pen drive (file://) e IPFS.
        Para ativar em produção HTTP, remova o `if (false &&`:
    -->
    <script>
      if (false && 'serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker
            .register('{{ relative_root }}sw.js', { scope: '{{ relative_root }}' })
            .then(function(reg) {
              console.log('[SW] Registered. Scope:', reg.scope);
            })
            .catch(function(err) {
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>

</body>
</html>
